plugins {
    id 'java-gradle-plugin'
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    sourceCompatibility = JavaVersion.VERSION_17
}

gradlePlugin {
    plugins {
        simplePlugin {
            id = 'dev.mudkip.workbench'
            implementationClass = 'dev.mudkip.workbench.gradle.GradlePlugin'
        }
    }
}

repositories {
    mavenCentral()
    maven { url 'https://jitpack.io' }
    maven { url 'https://maven.fabricmc.net' }
}

dependencies {
    implementation 'org.vineflower:vineflower:1.9.2'
    implementation 'com.github.fabricmc:mapping-io:f92f89ce47'
    implementation 'net.fabricmc:tiny-remapper:0.8.0'
}

group 'dev.mudkip'
version '0.1.0'